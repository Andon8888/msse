<!DOCTYPE html>

<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <img src="images/logo.jpg" class="logo">
    <div class="header-text">
      <h1>澳門性教育學會 MSSE</h1>
      <p>愛的教育 · 自尊自重 · 愛己愛人</p>
    </div>
  </div>
</header>

<nav>
<a href="index.html">首頁</a>
<a href="about.html">關於我們</a>
<a href="constitution.html">章程架構</a>
<a href="events.html">最新活動</a>
<a href="newsletter.html">學會會訊</a>
<a href="membership.html">加入會員</a>
<a href="contact.html">聯絡我們</a>
</nav>

<div class="container">
<div class="tabs">
  <button onclick="showTab('upcoming')">最新活動</button>
  <button onclick="showTab('past')">過往活動</button>
</div>
<h2>🎯 最新活動</h2>
<div id="upcoming"></div>

<h2>📚 過往活動</h2>
<div id="past"></div>

</div>

<script src="js/events.js"></script>
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>


<script>
const links = document.querySelectorAll("nav a");
const current = window.location.pathname.split("/").pop();

links.forEach(link => {
  const href = link.getAttribute("href");

  if(href === current){
    link.classList.add("active");
  }

  // 🔥 特別處理 event-detail
  if(current.startsWith("event-detail") && href === "events.html"){
    link.classList.add("active");
  }
});
</script>

</body>
</html>
